<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0d1117"/>
  <!-- Title -->
  <rect x="200" y="20" width="400" height="50" rx="8" fill="#1a2744"/>
  <text x="400" y="52" fill="#58a6ff" font-size="18" font-weight="bold" text-anchor="middle" font-family="Arial">E-commerce Webhooks</text>
  <!-- Webhook Trigger -->
  <rect x="30" y="120" width="130" height="50" rx="8" fill="#1f6feb"/>
  <text x="95" y="140" fill="white" font-size="11" font-weight="bold" text-anchor="middle" font-family="Arial">Webhook</text>
  <text x="95" y="158" fill="#cdd9e5" font-size="10" text-anchor="middle" font-family="Arial">Order Trigger</text>
  <!-- Arrow -->
  <line x1="160" y1="145" x2="195" y2="145" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Parse Order -->
  <rect x="195" y="120" width="130" height="50" rx="8" fill="#238636"/>
  <text x="260" y="140" fill="white" font-size="11" font-weight="bold" text-anchor="middle" font-family="Arial">Parse Order</text>
  <text x="260" y="158" fill="#cdd9e5" font-size="10" text-anchor="middle" font-family="Arial">Extract Data</text>
  <!-- Arrow -->
  <line x1="325" y1="145" x2="360" y2="145" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Router -->
  <rect x="360" y="120" width="130" height="50" rx="8" fill="#9e6a03"/>
  <text x="425" y="140" fill="white" font-size="11" font-weight="bold" text-anchor="middle" font-family="Arial">Route by</text>
  <text x="425" y="158" fill="#cdd9e5" font-size="10" text-anchor="middle" font-family="Arial">Event Type</text>
  <!-- Arrows down -->
  <line x1="425" y1="170" x2="425" y2="210" stroke="#58a6ff" stroke-width="2"/>
  <line x1="425" y1="210" x2="230" y2="210" stroke="#58a6ff" stroke-width="2"/>
  <line x1="425" y1="210" x2="620" y2="210" stroke="#58a6ff" stroke-width="2"/>
  <line x1="230" y1="210" x2="230" y2="250" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="425" y1="210" x2="425" y2="250" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="620" y1="210" x2="620" y2="250" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Email Node -->
  <rect x="165" y="250" width="130" height="50" rx="8" fill="#388bfd"/>
  <text x="230" y="270" fill="white" font-size="11" font-weight="bold" text-anchor="middle" font-family="Arial">Gmail</text>
  <text x="230" y="288" fill="#cdd9e5" font-size="10" text-anchor="middle" font-family="Arial">Send Confirmation</text>
  <!-- Inventory Node -->
  <rect x="360" y="250" width="130" height="50" rx="8" fill="#388bfd"/>
  <text x="425" y="270" fill="white" font-size="11" font-weight="bold" text-anchor="middle" font-family="Arial">Update Stock</text>
  <text x="425" y="288" fill="#cdd9e5" font-size="10" text-anchor="middle" font-family="Arial">Google Sheets</text>
  <!-- Slack Node -->
  <rect x="555" y="250" width="130" height="50" rx="8" fill="#388bfd"/>
  <text x="620" y="270" fill="white" font-size="11" font-weight="bold" text-anchor="middle" font-family="Arial">Slack Alert</text>
  <text x="620" y="288" fill="#cdd9e5" font-size="10" text-anchor="middle" font-family="Arial">Notify Team</text>
  <!-- Log Success -->
  <rect x="295" y="360" width="210" height="50" rx="8" fill="#238636"/>
  <text x="400" y="380" fill="white" font-size="11" font-weight="bold" text-anchor="middle" font-family="Arial">Log Success</text>
  <text x="400" y="398" fill="#cdd9e5" font-size="10" text-anchor="middle" font-family="Arial">Webhook Response</text>
  <!-- Arrows to log -->
  <line x1="230" y1="300" x2="230" y2="330" stroke="#3fb950" stroke-width="2"/>
  <line x1="230" y1="330" x2="400" y2="330" stroke="#3fb950" stroke-width="2"/>
  <line x1="425" y1="300" x2="425" y2="330" stroke="#3fb950" stroke-width="2"/>
  <line x1="620" y1="300" x2="620" y2="330" stroke="#3fb950" stroke-width="2"/>
  <line x1="620" y1="330" x2="400" y2="330" stroke="#3fb950" stroke-width="2"/>
  <line x1="400" y1="330" x2="400" y2="360" stroke="#3fb950" stroke-width="2" marker-end="url(#arr2)"/>
  <!-- Arrow defs -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
  </defs>
  <!-- Footer -->
  <text x="400" y="470" fill="#8b949e" font-size="10" text-anchor="middle" font-family="Arial">github.com/Benbrika8/E-commerce-Webhooks</text>
</svg>
